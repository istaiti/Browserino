name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Build
        run: |
          xcodebuild \
            -project Browserino.xcodeproj \
            -scheme Browserino \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS="CI_BUILD" \
            build

      - name: Zip app
        run: ditto -c -k --sequesterRsrc --keepParent build/Build/Products/Release/Browserino.app Browserino.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Browserino
          path: Browserino.zip

      # ponytail: rolling "latest" release, recreated each push to main.
      # Switch to per-version tags when builds need to be kept around.
      - name: Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest Browserino.zip \
            --target "$GITHUB_SHA" \
            --title "Latest build (${GITHUB_SHA::7})" \
            --prerelease \
            --notes 'Unsigned build of `main`. After unzipping, run `xattr -dr com.apple.quarantine /path/to/Browserino.app` before launching.'

      - name: Run instructions
        if: always()
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## ⚠️ Running the downloaded artifact

          The build is **unsigned**, so macOS Gatekeeper will block it with
          *"Apple could not verify 'Browserino' is free of malware"*.

          After unzipping, strip the quarantine attribute:

          ```sh
          xattr -dr com.apple.quarantine /path/to/Browserino.app
          ```

          Then double-click to launch.
          EOF
