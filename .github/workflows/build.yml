name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Build
        run: |
          xcodebuild \
            -project Browserino.xcodeproj \
            -scheme Browserino \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS="CI_BUILD" \
            build

      - name: Zip app
        run: ditto -c -k --sequesterRsrc --keepParent build/Build/Products/Release/Browserino.app Browserino.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Browserino
          path: Browserino.zip
